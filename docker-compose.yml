services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bloodbowl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloodbowl}
      POSTGRES_DB: ${POSTGRES_DB:-bloodbowl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloodbowl}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: asoddm/bloodbowl-backend:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bloodbowl}:${POSTGRES_PASSWORD:-bloodbowl}@db:5432/${POSTGRES_DB:-bloodbowl}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: asoddm/bloodbowl-frontend:latest
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

  # Fase 0: poblar datos de referencia (razas, posiciones, habilidades)
  # Uso: docker compose --profile tools run --rm scraper
  scraper:
    image: asoddm/bloodbowl-backend:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bloodbowl}:${POSTGRES_PASSWORD:-bloodbowl}@db:5432/${POSTGRES_DB:-bloodbowl}
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "ts-node", "scripts/scraper.ts"]
    profiles: ["tools"]

volumes:
  postgres_data:
