services:
  bloodbowl_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bloodbowl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloodbowl}
      POSTGRES_DB: ${POSTGRES_DB:-bloodbowl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloodbowl}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bloodbowl_backend:
    image: asoddm/bloodbowl-backend:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bloodbowl}:${POSTGRES_PASSWORD:-bloodbowl}@bloodbowl_db:5432/${POSTGRES_DB:-bloodbowl}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      bloodbowl_db:
        condition: service_healthy

  bloodbowl_frontend:
    image: asoddm/bloodbowl-frontend:latest
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - bloodbowl_backend

volumes:
  postgres_data:
